# Codemagic CI/CD configuration for cibei_space (慈悲空间)
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/

definitions:
  # Shared instance config via YAML anchor — reuse across workflows
  common_instance: &common_instance
    instance_type: mac_mini_m2
    max_build_duration: 120

  # Common env vars
  common_env: &common_env
    APP_NAME: cibei_space
    PACKAGE_NAME: com.xxh.cibei_space

workflows:
  # ── Android Release ──────────────────────────────────────────────
  android-release:
    <<: *common_instance
    name: Android Release
    environment:
      groups:
        # Create these groups in Codemagic UI → Environment variables:
        #   - android_keystore: STORE_FILE, STORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
        - android_keystore
      vars:
        <<: *common_env
      flutter: stable   # or pin a version, e.g. 3.32.0
      java: 17
    cache:
      cache_paths:
        - ~/.pub-cache
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Set up keystore
        script: |
          cat <<EOF > "$FCI_BUILD_DIR/android/key.properties"
          storeFile=$STORE_FILE
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Run code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Run tests
        script: flutter test --no-pub
      - name: Build APK (release)
        script: |
          flutter build apk --release \
            --build-number=$PROJECT_BUILD_NUMBER
      - name: Build AAB (release)
        script: |
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER
    artifacts:
      - build/app/outputs/apk/release/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
    publishing:
      email:
        recipients:
          - 6619766@gmail.com   # TODO: replace with your email

  # ── iOS Release ──────────────────────────────────────────────────
  ios-release:
    <<: *common_instance
    name: iOS Release
    integrations:
      app_store_connect: cibei_space   # Uses the App Store Connect API key integration
    environment:
      groups:
        - app_store_connect
        # Also add CERTIFICATE_PRIVATE_KEY to this group:
        # Generate with: openssl genrsa -out private_key.pem 2048
        # Paste the full PEM content as the value
      vars:
        <<: *common_env
        BUNDLE_ID: com.xxh.cibeispace
      flutter: stable
      xcode: latest
      cocoapods: default
      java: 17
    cache:
      cache_paths:
        - ~/.pub-cache
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Keychain setup
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply code signing profiles
        script: xcode-project use-profiles
      - name: Get Flutter dependencies
        script: |
          flutter pub get
          cd ios && pod install --repo-update
      - name: Run code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Run tests
        script: flutter test --no-pub
      - name: Build IPA (release)
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
      email:
        recipients:
          - 6619766@gmail.com

  # ── PR Checks (lightweight, runs on every PR) ────────────────────
  pr-checks:
    <<: *common_instance
    name: PR Checks
    environment:
      vars:
        <<: *common_env
      flutter: stable
      java: 17
    cache:
      cache_paths:
        - ~/.pub-cache
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Run code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Run static analysis
        script: flutter analyze --no-pub
      - name: Run tests
        script: flutter test --no-pub
