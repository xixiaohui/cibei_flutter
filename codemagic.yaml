definitions:
  # Shared instance config via YAML anchor — reuse across workflows
  common_instance: &common_instance
    instance_type: mac_mini_m2
    max_build_duration: 120

  # Common env vars
  common_env: &common_env
    APP_NAME: cibei_space
    PACKAGE_NAME: com.xxh.cibei_space

